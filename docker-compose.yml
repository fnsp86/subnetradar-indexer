services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: squid
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d squid"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    environment:
      - DB_NAME=squid
      - DB_PORT=5432
      - DB_HOST=db
      - DB_PASS=postgres
      - GQL_PORT=4350
    ports:
      - "4350:4350"
    command: ["sqd", "serve:prod"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build: .
    environment:
      - DB_NAME=squid
      - DB_PORT=5432
      - DB_HOST=db
      - DB_PASS=postgres
      - RPC_BITTENSOR_HTTP=https://entrypoint-finney.opentensor.ai
    command: ["sqd", "process:prod"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
