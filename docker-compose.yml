version: "3"

services:
  db:
    image: postgres:15-alpine
    network_mode: host
    environment:
      POSTGRES_DB: squid
      POSTGRES_USER: squid
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squid -d squid"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    network_mode: host
    environment:
      - DB_NAME=squid
      - DB_PORT=5432
      - DB_HOST=localhost
      - DB_PASS=postgres
      - DB_USER=squid
      - GQL_PORT=4350
    command: ["sqd", "serve:prod"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build: .
    network_mode: host
    environment:
      - DB_NAME=squid
      - DB_PORT=5432
      - DB_HOST=localhost
      - DB_PASS=postgres
      - DB_USER=squid
      - RPC_BITTENSOR_HTTP=https://entrypoint-finney.opentensor.ai
      - PROCESSOR_PROMETHEUS_PORT=9090
    command: ["sqd", "process:prod"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
